<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>送信完了 | 0-TOOLs</title>
  <link rel="canonical" href="https://0-tools.com/contact/thanks/">
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/page.css">
  <style>
    .thanks-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: 40px 16px;
    }
    .thanks-icon {
      width: 64px;
      height: 64px;
      background: #dcfce7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    .thanks-icon svg {
      color: #16a34a;
    }
    .thanks-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
    }
    .thanks-body {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.75;
      max-width: 400px;
      margin-bottom: 32px;
    }
    .thanks-note {
      font-size: 0.8rem;
      color: var(--text-subtle);
      margin-bottom: 32px;
    }
    .btn-home {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: var(--radius-full);
      text-decoration: none;
    }
    .btn-home:hover {
      background: var(--accent-dark);
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="/" class="site-brand">0-TOOLs</a>
    <a href="/" class="header-home">← ホームへ</a>
  </header>

  <main class="page-main">
    <div class="page-container">
      <div class="thanks-wrap">

        <div class="thanks-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>

        <h1 class="thanks-title">送信が完了しました</h1>

        <p class="thanks-body">
          お問い合わせいただきありがとうございます。<br>
          内容を確認のうえ、ご返信いたします。
        </p>

        <p class="thanks-note">
          ※ 当サイトは個人運営のため、返信までにお時間をいただく場合があります。<br>
          　 内容によっては返信できない場合もございます。
        </p>

        <a href="/" class="btn-home">ホームへ戻る</a>

      </div>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 0-TOOLs</p>
    <nav class="footer-nav">
      <a href="/">ホーム</a>
      <a href="/guide/">使い方</a>
      <a href="/faq/">FAQ</a>
      <a href="/about/">運営者情報</a>
      <a href="/privacy/">プライバシーポリシー・免責事項</a>
    </nav>
  </footer>

</body>
</html>
